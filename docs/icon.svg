<svg id="appIcon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgSky" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E0F2FE" /> 
            <stop offset="60%" stop-color="#BAE6FD" />
            <stop offset="100%" stop-color="#38BDF8" /> 
        </linearGradient>
        <linearGradient id="glassRim" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255, 255, 255, 1)" />
            <stop offset="40%" stop-color="rgba(255, 255, 255, 0.6)" />
            <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
        </linearGradient>
        <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255, 255, 255, 0.9)" />
            <stop offset="100%" stop-color="rgba(255, 255, 255, 0.4)" />
        </linearGradient>
        <linearGradient id="crystalMain" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0284C7" />
            <stop offset="100%" stop-color="#075985" />
        </linearGradient>
        <linearGradient id="crystalAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" />
            <stop offset="100%" stop-color="#0284C7" />
        </linearGradient>
        <linearGradient id="arrowFlow" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7DD3FC" />
            <stop offset="100%" stop-color="#FFFFFF" />
        </linearGradient>

        <filter id="glassShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0284C7" flood-opacity="0.2"/>
        </filter>
        <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#075985" flood-opacity="0.25"/>
        </filter>

        <!-- 新增：将 blur(40px) 转换为标准 SVG 滤镜 -->
        <filter id="blur40" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="40" />
        </filter>
        
        <!-- 新增：将 drop-shadow 转换为标准 SVG 滤镜 -->
        <filter id="arrowShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0284C7" flood-opacity="0.25"/>
        </filter>

        <clipPath id="photoClip">
            <rect x="198" y="228" width="256" height="196" rx="42" />
        </clipPath>

        <clipPath id="clapperClipFixed">
            <rect x="0" y="0" width="156" height="28" rx="8" />
        </clipPath>
        <g id="clapperStick">
            <rect x="0" y="0" width="156" height="28" rx="8" fill="url(#crystalMain)" opacity="0.95" />
            <g clip-path="url(#clapperClipFixed)">
                <path d="M 15 -10 L 45 40 M 55 -10 L 85 40 M 95 -10 L 125 40 M 135 -10 L 165 40" stroke="#FFFFFF" stroke-width="14" opacity="0.85" />
            </g>
        </g>
    </defs>

    <!-- 修改：添加了 rx="112" 以匹配图片中的圆角效果 -->
    <rect width="512" height="512" rx="112" fill="url(#bgSky)" />
    
    <!-- 修改：使用标准的 url(#blur40) 替换 blur(40px) -->
    <circle cx="120" cy="140" r="140" fill="#FFFFFF" opacity="0.6" filter="url(#blur40)" />
    <circle cx="380" cy="360" r="160" fill="#0284C7" opacity="0.15" filter="url(#blur40)" />

    <g filter="url(#glassShadow)">
        <rect x="56" y="86" width="260" height="200" rx="44" fill="url(#glassBody)" />
        <g filter="url(#innerShadow)">
            <rect x="108" y="164" width="156" height="96" rx="16" fill="url(#crystalMain)" opacity="0.95" />
            <path d="M 174 194 L 206 212 L 174 230 Z" fill="#FFFFFF" opacity="0.95" />
            <use href="#clapperStick" transform="translate(108, 134) rotate(-18, 8, 26)" />
        </g>
        <rect x="58" y="88" width="256" height="196" rx="42" fill="none" stroke="url(#glassRim)" stroke-width="4" />
    </g>

    <g filter="url(#glassShadow)">
        <rect x="196" y="226" width="260" height="200" rx="44" fill="url(#glassBody)" />
        <g filter="url(#innerShadow)" clip-path="url(#photoClip)">
            <circle cx="376" cy="286" r="28" fill="#38BDF8" opacity="0.95"/>
            <path d="M 176 430 L 270 336 Q 276 330 282 336 L 386 430 Z" fill="url(#crystalAccent)" opacity="0.6"/>
            <path d="M 226 430 L 320 346 Q 326 340 332 346 L 456 430 Z" fill="url(#crystalMain)" opacity="0.95"/>
        </g>
        <rect x="198" y="228" width="256" height="196" rx="42" fill="none" stroke="url(#glassRim)" stroke-width="4" />
    </g>

    <!-- 修改：使用标准的 url(#arrowShadow) 替换 drop-shadow(...) -->
    <path d="M 116 336 Q 116 436 256 436 M 226 406 L 256 436 L 226 466" 
          fill="none" stroke="url(#arrowFlow)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" 
          filter="url(#arrowShadow)" />
</svg>