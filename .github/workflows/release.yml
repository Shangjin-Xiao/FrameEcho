name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (used as APK versionName and artifact name, e.g. 1.0.1)'
        required: true
        default: '1.0.0'
        type: string

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/frameecho-release.jks

      - name: Build Release APK (signed)
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PVERSION_NAME="${{ inputs.version }}" \
            -PRELEASE_STORE_FILE=$RUNNER_TEMP/frameecho-release.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="frameecho" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: frameecho-release-apk-v${{ inputs.version }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30